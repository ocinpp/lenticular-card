<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Lenticular Effect</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #111;
        color: white;
        font-family: sans-serif;
      }
      #canvas-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #instructions {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        pointer-events: none;
        opacity: 0.6;
        z-index: 10;
      }
      #gyro-btn {
        position: absolute;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 16px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.4);
        color: white;
        border-radius: 20px;
        cursor: pointer;
        font-family: sans-serif;
        font-size: 14px;
        z-index: 10;
        transition: background 0.2s;
        display: none;
      }
      #gyro-btn:hover {
        background: rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="instructions">
      Move mouse to tilt. Use GUI on top right to tweak.
    </div>
    <button id="gyro-btn">Enable Gyroscope</button>

    <script type="module" src="/main.js"></script>
  </body>
</html>
