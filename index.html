<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Lenticular Effect</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #111;
        color: white;
        font-family: sans-serif;
      }
      #canvas-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #instructions {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        pointer-events: none;
        opacity: 0.6;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="instructions">
      Move mouse to tilt. Use GUI on top right to tweak.
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
